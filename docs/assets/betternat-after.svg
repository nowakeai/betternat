<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">After BetterNAT: appliance route, shared EIP, and AWS failover control plane</title>
  <desc id="desc">Private workloads use a private route table whose default route points to the active BetterNAT appliance. The active appliance runs betternat-agent and LoxiLB, SNATs through a shared EIP, and reaches the Internet. Active and standby appliances coordinate through a DynamoDB lease. During takeover, the standby appliance calls EC2 APIs to update the route target and move the shared EIP.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .subnet { fill: #eef2ff; stroke: #a5b4fc; stroke-width: 1.5; }
      .control { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; }
      .group { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5 5; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .active { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
      .standby { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; rx: 8; }
      .eip { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 8; }
      .internet { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
      .title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .edge { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow); }
      .mutual { fill: none; stroke: #334155; stroke-width: 2; marker-start: url(#arrow-dark); marker-end: url(#arrow-dark); }
      .failover { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-dashed); }
      .note { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6d28d9; }
      .packet { fill: #0ea5e9; opacity: 0.9; }
      @media (prefers-reduced-motion: reduce) {
        .packet { display: none; }
      }
      @media (prefers-color-scheme: dark) {
        .canvas { fill: #0b1120; }
        .panel { fill: #111827; stroke: #475569; }
        .subnet { fill: #172554; stroke: #60a5fa; }
        .control { fill: #052e2b; stroke: #34d399; }
        .group, .box { fill: #0f172a; stroke: #94a3b8; }
        .active { fill: #083344; stroke: #22d3ee; }
        .standby { fill: #431407; stroke: #fb923c; }
        .eip { fill: #422006; stroke: #facc15; }
        .internet { fill: #111827; stroke: #94a3b8; }
        .title, .label { fill: #f8fafc; }
        .small { fill: #cbd5e1; }
        .note { fill: #c4b5fd; }
        .mutual { stroke: #94a3b8; }
        #arrow-dark path { fill: #94a3b8; }
        .packet { fill: #38bdf8; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="640" class="canvas"/>
  <rect x="40" y="30" width="1120" height="470" rx="14" class="panel"/>
  <text x="600" y="62" text-anchor="middle" class="title">AWS VPC</text>

  <rect x="80" y="90" width="680" height="130" rx="12" class="subnet"/>
  <text x="420" y="118" text-anchor="middle" class="small">Private subnet</text>

  <rect x="80" y="270" width="900" height="190" rx="12" class="subnet"/>
  <text x="530" y="298" text-anchor="middle" class="small">Public subnet</text>

  <rect x="170" y="530" width="860" height="80" rx="12" class="control"/>
  <text x="600" y="557" text-anchor="middle" class="small">AWS control plane</text>

  <rect x="125" y="135" width="180" height="60" class="box"/>
  <text x="215" y="160" text-anchor="middle" class="label">Private</text>
  <text x="215" y="182" text-anchor="middle" class="label">workloads</text>

  <rect x="455" y="135" width="190" height="60" class="box"/>
  <text x="550" y="158" text-anchor="middle" class="label">Route table</text>
  <text x="550" y="181" text-anchor="middle" class="small">0.0.0.0/0</text>

  <rect x="410" y="315" width="300" height="120" rx="10" class="group"/>
  <text x="560" y="338" text-anchor="middle" class="small">BetterNAT appliances</text>

  <rect x="440" y="352" width="240" height="34" class="active"/>
  <text x="560" y="374" text-anchor="middle" class="label">Active: agent + LoxiLB</text>

  <rect x="440" y="396" width="240" height="28" class="standby"/>
  <text x="560" y="415" text-anchor="middle" class="small">Standby: ready for takeover</text>

  <rect x="820" y="345" width="90" height="58" class="eip"/>
  <text x="865" y="368" text-anchor="middle" class="label">Shared</text>
  <text x="865" y="390" text-anchor="middle" class="label">EIP</text>

  <circle cx="1060" cy="374" r="42" class="internet"/>
  <text x="1060" y="380" text-anchor="middle" class="label">Internet</text>

  <rect x="225" y="565" width="170" height="32" class="box"/>
  <text x="310" y="586" text-anchor="middle" class="label">DynamoDB lease</text>

  <rect x="515" y="565" width="150" height="32" class="box"/>
  <text x="590" y="586" text-anchor="middle" class="label">EC2 APIs</text>

  <rect x="765" y="565" width="210" height="32" class="box"/>
  <text x="870" y="586" text-anchor="middle" class="label">Route target + EIP update</text>

  <path d="M305 165 H455" class="edge"/>
  <path d="M550 195 V352" class="edge"/>
  <path d="M680 369 H820" class="edge"/>
  <path d="M910 374 H1018" class="edge"/>

  <g aria-hidden="true">
    <circle r="5" class="packet">
      <animateMotion dur="2.1s" repeatCount="indefinite" path="M305 165 H455"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="2.1s" begin="0.4s" repeatCount="indefinite" path="M550 195 V352"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="2.1s" begin="0.8s" repeatCount="indefinite" path="M680 369 H820"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="2.1s" begin="1.2s" repeatCount="indefinite" path="M910 374 H1018"/>
    </circle>
  </g>

  <text x="580" y="270" text-anchor="middle" class="small">active instance target</text>
  <text x="750" y="357" text-anchor="middle" class="small">SNAT via LoxiLB</text>

  <path d="M440 410 H310 V565" class="mutual"/>
  <path d="M560 424 V510 H590 V565" class="failover"/>
  <path d="M665 581 H765" class="failover"/>
  <text x="600" y="518" text-anchor="middle" class="note">lease, fencing, and takeover stay out of the data path</text>
</svg>
