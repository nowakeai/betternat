<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Download-heavy private subnet traffic cost flow</title>
  <desc id="desc">A private workload sends 10 TB of requests or uploads to public peers and receives 40 TB of responses or downloads. NAT Gateway processes 50 TB through the gateway. BetterNAT removes the managed NAT processing fee while standard data transfer still applies.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .nat { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; rx: 10; }
      .better { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; rx: 10; }
      .title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .muted { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .request { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .response { fill: none; stroke: #d97706; stroke-width: 5; marker-end: url(#arrow-amber); }
      .packet-blue { fill: #0ea5e9; opacity: 0.9; }
      .packet-amber { fill: #f59e0b; opacity: 0.9; }
      @media (prefers-reduced-motion: reduce) {
        .packet-blue, .packet-amber { display: none; }
      }
      @media (prefers-color-scheme: dark) {
        .canvas { fill: #0b1120; }
        .panel { fill: #111827; stroke: #475569; }
        .box { fill: #0f172a; stroke: #94a3b8; }
        .nat { fill: #431407; stroke: #fb923c; }
        .better { fill: #083344; stroke: #22d3ee; }
        .title, .label { fill: #f8fafc; }
        .small { fill: #cbd5e1; }
        .muted { fill: #94a3b8; }
        .packet-blue { fill: #38bdf8; }
        .packet-amber { fill: #fbbf24; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="430" class="canvas"/>
  <rect x="24" y="24" width="1072" height="382" rx="16" class="panel"/>
  <text x="560" y="62" text-anchor="middle" class="title">Download-heavy private subnet traffic</text>

  <rect x="82" y="150" width="210" height="92" class="box"/>
  <text x="187" y="184" text-anchor="middle" class="label">Private workload</text>
  <text x="187" y="208" text-anchor="middle" class="small">crawler, RPC node, EKS node</text>

  <rect x="455" y="142" width="210" height="108" class="nat"/>
  <text x="560" y="174" text-anchor="middle" class="label">NAT layer</text>
  <text x="560" y="198" text-anchor="middle" class="small">AWS NAT Gateway today</text>
  <text x="560" y="222" text-anchor="middle" class="small">BetterNAT after replacement</text>

  <rect x="828" y="150" width="210" height="92" class="box"/>
  <text x="933" y="184" text-anchor="middle" class="label">Public internet</text>
  <text x="933" y="208" text-anchor="middle" class="small">peers, APIs, registries</text>

  <path d="M292 176 H455" class="request"/>
  <path d="M665 176 H828" class="request"/>
  <text x="373" y="158" text-anchor="middle" class="small">10 TB requests / uploads</text>
  <text x="747" y="158" text-anchor="middle" class="small">10 TB out</text>

  <path d="M828 226 H665" class="response"/>
  <path d="M455 226 H292" class="response"/>
  <text x="747" y="266" text-anchor="middle" class="small">40 TB responses / downloads</text>
  <text x="373" y="266" text-anchor="middle" class="small">40 TB back in</text>

  <g aria-hidden="true">
    <circle r="5" class="packet-blue">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M292 176 H455"/>
    </circle>
    <circle r="5" class="packet-blue">
      <animateMotion dur="2.2s" begin="0.45s" repeatCount="indefinite" path="M665 176 H828"/>
    </circle>
    <circle r="7" class="packet-amber">
      <animateMotion dur="2.2s" begin="0.2s" repeatCount="indefinite" path="M828 226 H665"/>
    </circle>
    <circle r="7" class="packet-amber">
      <animateMotion dur="2.2s" begin="0.65s" repeatCount="indefinite" path="M455 226 H292"/>
    </circle>
  </g>

  <rect x="118" y="316" width="392" height="56" class="nat"/>
  <text x="314" y="340" text-anchor="middle" class="label">NAT Gateway sees 50 TB processed</text>
  <text x="314" y="360" text-anchor="middle" class="muted">request bytes + response bytes through the gateway</text>

  <rect x="610" y="316" width="392" height="56" class="better"/>
  <text x="806" y="340" text-anchor="middle" class="label">BetterNAT removes that NAT processing fee</text>
  <text x="806" y="360" text-anchor="middle" class="muted">standard AWS data transfer still applies</text>
</svg>
