<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Before BetterNAT: AWS NAT Gateway route path</title>
  <desc id="desc">Private workloads use a private route table whose default route points to an AWS NAT Gateway in a public subnet. The NAT Gateway uses its EIP to reach the Internet.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .subnet { fill: #eef2ff; stroke: #a5b4fc; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .internet { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
      .title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .edge { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow); }
      .packet { fill: #0ea5e9; opacity: 0.9; }
      @media (prefers-reduced-motion: reduce) {
        .packet { display: none; }
      }
      @media (prefers-color-scheme: dark) {
        .canvas { fill: #0b1120; }
        .panel { fill: #111827; stroke: #475569; }
        .subnet { fill: #172554; stroke: #60a5fa; }
        .box { fill: #0f172a; stroke: #94a3b8; }
        .internet { fill: #111827; stroke: #94a3b8; }
        .title, .label { fill: #f8fafc; }
        .small { fill: #cbd5e1; }
        .packet { fill: #38bdf8; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="360" class="canvas"/>
  <rect x="20" y="20" width="1080" height="300" rx="14" class="panel"/>
  <text x="560" y="50" text-anchor="middle" class="title">AWS VPC</text>

  <rect x="60" y="80" width="470" height="180" rx="12" class="subnet"/>
  <text x="295" y="108" text-anchor="middle" class="small">Private subnet</text>

  <rect x="590" y="80" width="350" height="180" rx="12" class="subnet"/>
  <text x="765" y="108" text-anchor="middle" class="small">Public subnet</text>

  <rect x="100" y="140" width="170" height="70" class="box"/>
  <text x="185" y="169" text-anchor="middle" class="label">Private</text>
  <text x="185" y="191" text-anchor="middle" class="label">workloads</text>

  <rect x="330" y="140" width="160" height="70" class="box"/>
  <text x="410" y="166" text-anchor="middle" class="label">Route table</text>
  <text x="410" y="190" text-anchor="middle" class="small">0.0.0.0/0</text>

  <rect x="640" y="140" width="160" height="70" class="box"/>
  <text x="720" y="169" text-anchor="middle" class="label">AWS NAT</text>
  <text x="720" y="191" text-anchor="middle" class="label">Gateway</text>

  <rect x="850" y="140" width="70" height="70" class="box"/>
  <text x="885" y="169" text-anchor="middle" class="label">EIP</text>
  <text x="885" y="191" text-anchor="middle" class="small">managed</text>

  <circle cx="1020" cy="175" r="42" class="internet"/>
  <text x="1020" y="181" text-anchor="middle" class="label">Internet</text>

  <path d="M270 175 H330" class="edge"/>
  <path d="M490 175 H640" class="edge"/>
  <path d="M800 175 H850" class="edge"/>
  <path d="M920 175 H978" class="edge"/>

  <g aria-hidden="true">
    <circle r="5" class="packet">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M270 175 H330"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="1.8s" begin="0.35s" repeatCount="indefinite" path="M490 175 H640"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="1.8s" begin="0.7s" repeatCount="indefinite" path="M800 175 H850"/>
    </circle>
    <circle r="5" class="packet">
      <animateMotion dur="1.8s" begin="1.05s" repeatCount="indefinite" path="M920 175 H978"/>
    </circle>
  </g>

  <text x="565" y="158" text-anchor="middle" class="small">nat_gateway_id</text>
</svg>
